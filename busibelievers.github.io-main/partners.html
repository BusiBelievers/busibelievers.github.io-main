<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BUSI Community Partners</title>

<style>

body{
font-family:Arial;
background:#0b1220;
color:white;
margin:0;
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
margin-top:40px;
}

.card{
background:rgba(255,255,255,0.06);
padding:25px;
border-radius:16px;
border:1px solid rgba(255,255,255,0.1);
}

</style>

</head>

<body>

<div class="container">

<h1>BUSI Community Partners</h1>

<p style="max-width:700px;margin:auto">
Busi Believers Incorporated works alongside churches, volunteers,
and community organizations committed to strengthening families,
mentorship, and community service.
</p>

<div id="partnerDirectory" class="grid"></div>

</div>

<script>

/* Example Partner List */

let partners = [

{
name:"Faith Community Church",
city:"San Antonio, TX",
type:"Church",
description:"Community outreach and mentorship support."
},

{
name:"River City Volunteers",
city:"San Antonio, TX",
type:"Volunteer Group",
description:"Local volunteers assisting with community projects."
},

{
name:"Kingdom Builders Ministry",
city:"Austin, TX",
type:"Church",
description:"Faith-based mentorship and leadership development."
},

{
name:"Community Trade Network",
city:"Houston, TX",
type:"Business Network",
description:"Local businesses supporting community projects."
}

];

/* Render Partner Directory */

let container = document.getElementById("partnerDirectory");

partners.forEach(p => {

container.innerHTML += `

<div class="card">

<h3>${p.name}</h3>

<p><strong>${p.type}</strong></p>

<p>${p.city}</p>

<p style="font-size:14px;color:#ccc">
${p.description}
</p>

</div>

`;

});

</script>

</body>
</html>
