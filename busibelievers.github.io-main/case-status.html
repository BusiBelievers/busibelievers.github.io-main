<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BUSI Case Status</title>

<style>

body{
font-family:Arial;
margin:0;
background:#0b1220;
color:white;
}

.container{
max-width:1000px;
margin:auto;
padding:40px 20px;
}

.card{
background:rgba(255,255,255,0.06);
padding:25px;
border-radius:16px;
border:1px solid rgba(255,255,255,0.1);
margin-top:20px;
}

.status{
font-weight:bold;
padding:4px 10px;
border-radius:6px;
}

.pending{background:#f1c40f;color:black;}
.approved{background:#3498db;}
.progress{background:#e67e22;}
.completed{background:#2ecc71;color:black;}

</style>

</head>

<body>

<div class="container">

<h1 style="text-align:center">BUSI Case Status Tracker</h1>
<div style="text-align:center;margin-top:30px;">

<input
id="caseSearch"
type="text"
placeholder="Enter Case Number (Example: BUSI-010)"
style="padding:12px;border-radius:10px;border:none;width:260px;"
>

<button onclick="searchCase()" style="padding:12px 18px;border-radius:10px;border:none;background:#d4af37;font-weight:bold;">
Search
</button>

</div>
  
<p style="text-align:center;max-width:700px;margin:auto">
Participants can view the status of assistance requests submitted
to Busi Believers Incorporated.
</p>

<div id="caseContainer"></div>
  
</div>

<script>

let cases = JSON.parse(localStorage.getItem("busiCases")) || [];
  
let container = document.getElementById("caseContainer")
  
if(cases.length === 0){
container.innerHTML = "<p style='text-align:center;margin-top:30px;color:rgba(255,255,255,0.7)'>No cases available yet.</p>";
}
  
cases.forEach(c => {

let statusClass = "pending";

if(c.status === "Approved") statusClass = "approved";
if(c.status === "In Progress") statusClass = "progress";
if(c.status === "Completed") statusClass = "completed";

container.innerHTML += `
<div class="card">

<h3>
<a href="impact-map.html?case=${c.caseID}">
${c.caseID}
</a>
</h3>

<p><strong>Project:</strong> ${c.project}</p>

<p><strong>Location:</strong> ${c.location}</p>

<p><strong>Status:</strong> <span class="status ${statusClass}">${c.status}</span></p>

</div>
`;

});

function searchCase(){

let input = document.getElementById("caseSearch").value.toUpperCase();

let cards = document.querySelectorAll(".card");

cards.forEach(card => {

if(card.innerText.toUpperCase().includes(input)){
card.style.display = "block";
}else{
card.style.display = "none";
}

});

}

</script>  
  
</body>
</html>
