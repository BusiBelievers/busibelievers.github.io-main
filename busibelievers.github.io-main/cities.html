<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BUSI Service Cities</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
background:#0b1220;
color:white;
margin:0;
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
text-align:center;
}

#map{
height:550px;
border-radius:16px;
margin-top:30px;
}

.card{
background:rgba(255,255,255,0.06);
padding:20px;
border-radius:16px;
border:1px solid rgba(255,255,255,0.1);
margin-top:30px;
}

</style>

</head>

<body>

<div class="container">

<h1>BUSI Service Cities</h1>

<p style="max-width:700px;margin:auto">
Busi Believers Incorporated serves communities through mentorship,
stewardship education, and community assistance programs.
</p>

<div id="map"></div>

<div class="card">

<h2>Current Service Areas</h2>

<p>
San Antonio, Texas
</p>

</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* Create Map */

var map = L.map('map').setView([29.4241, -98.4936], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);

/* BUSI Cities */

let cities = [

{
name:"San Antonio, TX",
lat:29.4241,
lng:-98.4936,
description:"BUSI Headquarters — mentorship and community support programs."
},

{
name:"Houston, TX",
lat:29.7604,
lng:-95.3698,
description:"Future BUSI expansion city."
},

{
name:"Dallas, TX",
lat:32.7767,
lng:-96.7970,
description:"Future BUSI expansion city."
}

];

cities.forEach(city=>{

L.marker([city.lat,city.lng]).addTo(map)

.bindPopup(`

<b>${city.name}</b><br>
${city.description}

`);

});

</script>

</body>
</html>
