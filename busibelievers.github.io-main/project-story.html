<!DOCTYPE html>

<html>

<head>

<title>BUSI Project Story</title>

<style>

body{
font-family:Arial;
background:#0b1220;
color:white;
margin:0;
}

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

.images{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

.images img{
width:100%;
border-radius:10px;
}

.status{
color:#d4af37;
font-weight:bold;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h1 id="projectTitle"></h1>

<p id="projectLocation"></p>

<p id="projectStatus" class="status"></p>

<p id="projectDescription"></p>

<div class="images" id="projectImages"></div>

<h3 style="margin-top:40px">Volunteers</h3>

<div id="volunteerList"></div>

</div>

<script>

/* Get project ID from URL */

let params = new URLSearchParams(window.location.search);

let id = params.get("case");

/* Load cases */

let cases = JSON.parse(localStorage.getItem("busiCases")) || [];

let project = cases.find(c => c.caseID === id);

if(project){

document.getElementById("projectTitle").innerText =
project.caseID + " — " + project.project;

document.getElementById("projectLocation").innerText =
"Location: " + project.location;

document.getElementById("projectStatus").innerText =
"Status: " + project.status;

document.getElementById("projectDescription").innerText =
project.description || "";

/* Images */

let images = document.getElementById("projectImages");

if(project.beforePhoto){
images.innerHTML += `<img src="${project.beforePhoto}" alt="Before">`;
}

if(project.afterPhoto){
images.innerHTML += `<img src="${project.afterPhoto}" alt="After">`;
}

/* Volunteers */

let volunteers = document.getElementById("volunteerList");

if(project.volunteersAssigned && project.volunteersAssigned.length > 0){

project.volunteersAssigned.forEach(v => {
volunteers.innerHTML += `<p>• ${v}</p>`;
});

}else{

volunteers.innerHTML = "<p>No volunteers listed yet.</p>";

}

}

</script>

</body>
</html>
