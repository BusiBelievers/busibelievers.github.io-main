<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BUSI Network Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
background:#0b1220;
color:white;
margin:0;
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
text-align:center;
}

#map{
height:600px;
border-radius:16px;
margin-top:30px;
}

.legend{
margin-top:20px;
background:#1c2233;
padding:15px;
border-radius:10px;
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<h1>BUSI National Network</h1>

<p style="max-width:700px;margin:auto">
Busi Believers Incorporated continues expanding its mentorship and
community support network across cities through volunteers,
partners, and community leaders.
</p>

<div id="map"></div>

<div class="legend">

🔵 Active BUSI City
🟢 Volunteer Hub
🟡 Future Expansion

</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* Create Map */

var map = L.map('map').setView([31.0,-98.0],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);

/* Marker Icons */

var blueIcon = new L.Icon({
iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png',
shadowUrl:'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
iconSize:[25,41],
iconAnchor:[12,41]
});

var greenIcon = new L.Icon({
iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',
shadowUrl:'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
iconSize:[25,41],
iconAnchor:[12,41]
});

var yellowIcon = new L.Icon({
iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-yellow.png',
shadowUrl:'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
iconSize:[25,41],
iconAnchor:[12,41]
});

/* BUSI Network Cities */

let cities = [

{
name:"San Antonio, TX",
lat:29.4241,
lng:-98.4936,
icon:blueIcon,
description:"BUSI Headquarters and primary service area."
},

{
name:"Austin, TX",
lat:30.2672,
lng:-97.7431,
icon:greenIcon,
description:"Volunteer hub supporting regional outreach."
},

{
name:"Houston, TX",
lat:29.7604,
lng:-95.3698,
icon:yellowIcon,
description:"Future BUSI expansion city."
},

{
name:"Dallas, TX",
lat:32.7767,
lng:-96.7970,
icon:yellowIcon,
description:"Future BUSI expansion city."
}

];

/* Place Markers */

cities.forEach(city => {

L.marker([city.lat,city.lng],{icon:city.icon})
.addTo(map)
.bindPopup(`

<b>${city.name}</b><br>
${city.description}

`);

});

</script>

</body>
</html>
