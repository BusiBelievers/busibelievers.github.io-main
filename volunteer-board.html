<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BUSI Volunteer Dispatch Board</title>

<style>

body{
font-family:Arial;
margin:0;
background:#0b1220;
color:white;
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
margin-top:40px;
}

.card{
background:rgba(255,255,255,0.06);
padding:25px;
border-radius:16px;
border:1px solid rgba(255,255,255,0.1);
}

.btn{
display:inline-block;
padding:10px 18px;
background:#d4af37;
color:black;
border-radius:8px;
text-decoration:none;
margin-top:10px;
font-weight:bold;
}

.status{
font-weight:bold;
padding:4px 8px;
border-radius:6px;
}

.pending{background:#f1c40f;color:black;}
.approved{background:#3498db;}
.progress{background:#e67e22;}
.completed{background:#2ecc71;color:black;}

</style>

</head>

<body>

<div class="container">

<h1>BUSI Volunteer Dispatch Board</h1>

<p style="max-width:700px;margin:auto">
These are current community projects where volunteers are needed.
If you are able to assist, please sign up and a BUSI coordinator will contact you.
</p>

<div id="volunteerBoard" class="grid"></div>

</div>

<script>

let cases = JSON.parse(localStorage.getItem("busiCases")) || [];

let board = document.getElementById("volunteerBoard");

cases.forEach(c => {

if(c.status !== "Completed"){

let statusClass = "pending";

if(c.status === "Approved") statusClass="approved";
if(c.status === "In Progress") statusClass="progress";

<h3>${c.caseID}</h3>

<p><strong>${c.project}</strong></p>

<p>Location: ${c.location}</p>

<p><strong>Status:</strong>
<span class="status ${statusClass}">
${c.status}
</span>
</p>

</body>
</html>
