<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BUSI Admin Dashboard</title>

<style>

body{
font-family:Arial;
background:#0b1220;
color:white;
margin:0;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
margin-top:30px;
}

.card{
background:rgba(255,255,255,0.06);
padding:25px;
border-radius:16px;
border:1px solid rgba(255,255,255,0.1);
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:none;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
background:#d4af37;
font-weight:bold;
cursor:pointer;
}

.projectBox{
background:#1c2233;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

.org-header{display:flex;align-items:center;gap:20px;padding:14px 20px;background:#0b1220;border-bottom:3px solid #d4af37;}
.org-header img{height:92px;width:auto;object-fit:contain;filter:drop-shadow(0 0 8px #d4af37);}
.org-info{display:flex;flex-direction:column;gap:2px;font-size:15px;line-height:1.5;color:white;}
.org-info strong{font-size:18px;}
.org-info em{color:#d4af37;}
@media print{body{background:white!important;color:black!important;}.org-header{background:white!important;border-bottom:3px solid #d4af37;}.org-info strong,.org-info span{color:black!important;}}</style>

</head>

<body>
<div class="org-header"><img src="logo.png" alt="Busi Believers Incorporated"><div class="org-info"><strong>Busi Believers Incorporated</strong><span>Bonding Using Stewardship and Integrity</span><span>San Antonio, Texas</span><em>"No voice nor invoice will go unheard."</em></div><a href="index.html" style="margin-left:auto;display:inline-flex;align-items:center;gap:6px;padding:8px 18px;background:#d4af37;color:#0b1220;font-weight:bold;font-size:14px;border-radius:999px;text-decoration:none;">&#127968; Home</a></div>

<div class="container">

<h1 style="text-align:center">BUSI Admin Dashboard</h1>

<p style="text-align:center;max-width:700px;margin:auto">
Control center for managing BUSI community assistance projects.
</p>

<div class="grid">

<!-- CASE MANAGER -->

<div class="card">

<h2>Case Manager</h2>

<input id="caseID" placeholder="Case Number (Example BUSI-021)">
<input id="projectName" placeholder="Project Name">
<input id="location" placeholder="City / Area">
<input id="volunteersNeeded" placeholder="Volunteers Needed">
<input id="beforePhoto" placeholder="Before Photo URL">
<input id="afterPhoto" placeholder="After Photo URL">

<select id="status">

<option>Pending Review</option>
<option>Approved</option>
<option>In Progress</option>
<option>Completed</option>

</select>

<button onclick="addCase()">Add Case</button>

</div>

<!-- ADMIN NOTIFICATIONS -->

<div class="card">

<h2>Recent Activity</h2>

<div id="adminNotifications"></div>

</div>

</div>

<h2 style="margin-top:60px">Project Control Center</h2>

<div id="adminProjectBoard"></div>

</div>

<script>

/* Load cases */

let cases = JSON.parse(localStorage.getItem("busiCases")) || [];


/* SAVE */

function saveCases(){

localStorage.setItem("busiCases", JSON.stringify(cases));

}


/* ADD CASE */

function addCase(){

let caseID = document.getElementById("caseID").value;
let project = document.getElementById("projectName").value;
let location = document.getElementById("location").value;
let status = document.getElementById("status").value;
let volunteersNeeded = Number(document.getElementById("volunteersNeeded").value) || 0;
let beforePhoto = document.getElementById("beforePhoto").value;
let afterPhoto = document.getElementById("afterPhoto").value;

cases.push({
caseID,
project,
location,
status,
volunteersNeeded,
beforePhoto,
afterPhoto,
fundingGoal:0,
fundingRaised:0,
volunteersAssigned:[]
});


saveCases();

renderCases();

alert("Case Added Successfully");

}


/* RENDER PROJECTS */

function renderCases(){

let board = document.getElementById("adminProjectBoard");

board.innerHTML="";

cases.forEach((c,index)=>{

board.innerHTML += `

<div class="projectBox">

<strong>${c.caseID}</strong> — ${c.project}<br>
Location: ${c.location}<br>
Status: ${c.status}

<br><br>

Funding Raised:
<input id="fund-${index}" type="number" value="${c.fundingRaised}">

<button onclick="updateFunding(${index})">Update Funding</button>

<br><br>

Status:

<select id="status-${index}">

<option ${c.status==="Pending Review"?"selected":""}>Pending Review</option>
<option ${c.status==="Approved"?"selected":""}>Approved</option>
<option ${c.status==="In Progress"?"selected":""}>In Progress</option>
<option ${c.status==="Completed"?"selected":""}>Completed</option>

</select>

<button onclick="updateStatus(${index})">Update Status</button>

<button onclick="deleteCase(${index})" style="background:#e74c3c;color:white">
Delete
</button>

</div>

`;

});

saveCases();

}


/* UPDATE FUNDING */

function updateFunding(index){

let value = document.getElementById("fund-"+index).value;

cases[index].fundingRaised = Number(value);

saveCases();

renderCases();

}


/* UPDATE STATUS */

function updateStatus(index){

let status = document.getElementById("status-"+index).value;

cases[index].status = status;

saveCases();

renderCases();

}


/* DELETE CASE */

function deleteCase(index){

cases.splice(index,1);

saveCases();

renderCases();

}


/* ADMIN NOTIFICATIONS */

function loadAdminNotifications(){

let container = document.getElementById("adminNotifications");

container.innerHTML="";

cases.slice(-5).reverse().forEach(c=>{

container.innerHTML+=`

<div style="background:#1c2233;padding:10px;border-radius:8px;margin-bottom:10px">

<strong>${c.caseID}</strong><br>
${c.project}<br>
Status: ${c.status}

</div>

`;

});

}


/* INITIAL LOAD */

renderCases();

loadAdminNotifications();

</script>

</body>
</html>
